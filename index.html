// ─── IndexedDB ──────────────────────────────────────────────────────
const DB_NAME = "IronLogDB";
const DB_STORE = "appdata";
const openDB = () => new Promise((resolve, reject) => {
  const req = indexedDB.open(DB_NAME, 1);
  req.onupgradeneeded = (e) => e.target.result.createObjectStore(DB_STORE);
  req.onsuccess = (e) => resolve(e.target.result);
  req.onerror = (e) => reject(e.target.error);
});
const dbSet = async (key, val) => {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(DB_STORE, "readwrite");
    tx.objectStore(DB_STORE).put(val, key);
    tx.oncomplete = () => res(true);
    tx.onerror = (e) => rej(e.target.error);
  });
};
const dbGet = async (key) => {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(DB_STORE, "readonly");
    const req = tx.objectStore(DB_STORE).get(key);
    req.onsuccess = () => res(req.result !== undefined ? req.result : null);
    req.onerror = (e) => rej(e.target.error);
  });
};

  { name: "Build", weeks: [4,5,6], color: "#d4a04a", desc: "Base loads - push intensity", icon: "B" },
  { name: "Strength", weeks: [7,8,9], color: "#e86060", desc: "Heavy - low reps - peak output", icon: "C" },
  { name: "Deload", weeks: [10], color: "#70b8e0", desc: "Cut a set - recover - reset", icon: "D" },
];
const getPhase = (wn) => { const cw = ((wn-1)%10)+1; return PHASES.find(p=>p.weeks.includes(cw))||PHASES[0]; };
const getCycleWeek = (wn) => ((wn-1)%10)+1;
const bumpR = (r, n) => {
  if (typeof r !== "string" || /sec|yd|breath|each way/.test(r)) return r;
  const m = r.match(/^(\d+)-(\d+)/);
  if (m) return (+m[1]+n) + "-" + (+m[2]+n) + r.slice(m[0].length);
  const m2 = r.match(/^(\d+)/);
  if (m2) return r.replace(m2[1], String(+m2[1]+n));
  return r;
};
const dropR = (r, n) => {
  if (typeof r !== "string" || /sec|yd|breath|each way/.test(r)) return r;
  const m = r.match(/^(\d+)-(\d+)/);
  if (m) return Math.max(3,+m[1]-n) + "-" + Math.max(4,+m[2]-n) + r.slice(m[0].length);
  const m2 = r.match(/^(\d+)/);
  if (m2) return r.replace(m2[1], String(Math.max(3,+m2[1]-n)));
  return r;
};
const phaseRx = (s, r, cat, ph) => {
  if (cat !== "main" && cat !== "core") return { sets: s, reps: r };
  const p = ph.name;
  if (cat === "core") {
    if (p === "Deload") return { sets: Math.max(1, s-1), reps: r };
    return { sets: s, reps: r };
  }
  if (p === "Foundation") return { sets: s, reps: bumpR(r, 2) };
  if (p === "Strength") return { sets: s, reps: dropR(r, 2) };
  if (p === "Deload") return { sets: Math.max(2, s-1), reps: r };
  return { sets: s, reps: r };
};
const topOfRange = (repStr) => {
  if (typeof repStr !== "string") return 0;
  if (/sec|yd|breath/.test(repStr)) return 0;
  const m = repStr.match(/(\d+)\s*-\s*(\d+)/);
  if (m) return +m[2];
  const m2 = repStr.match(/^(\d+)/);
  return m2 ? +m2[1] : 0;
};

      else setScreen("landing");

  })(); }, []);

  useEffect(() => { if (screen === "main") { if (saveSkip.current.c++ > 0) dbSet("config", config).catch(() => {}); } }, [config]);
  useEffect(() => { if (screen === "main") { if (saveSkip.current.cp++ > 0) dbSet("completed", completed).catch(() => {}); } }, [completed]);
 
  // Rest timer tick
  useEffect(() => {
    if (!timerEnd) return;
    const iv = setInterval(() => setNow(Date.now()), 500);
    return () => clearInterval(iv);
  }, [timerEnd]);
  const timerLeft = timerEnd ? Math.max(0, Math.ceil((timerEnd - now) / 1000)) : 0;
  const timerDone = timerEnd && timerLeft === 0;
  const startTimer = (secs) => { setTimerEnd(Date.now() + secs * 1000); setTimerOpen(false); };

  const cw = getCycleWeek(wn);
  const locked = !!completed[dayKey];

  const tReps = Object.values(dayData).reduce((a, s) => a + (s ? s.reduce((b, x) => b + (parseInt(x.reps) || 0), 0) : 0), 0);
 
  // Previous session lookup — searches ALL days so history survives program changes
  const getPrev = (ex) => {
    const entries = Object.entries(data).filter(([k]) => k !== dayKey).sort(([a], [b]) => b.localeCompare(a));
    for (const [, dd] of entries) { if (dd[ex] && dd[ex].length && dd[ex].some(s => s.reps)) return dd[ex]; }
    return null;
  };
  const prevBest = (sets) => {
    let best = null;
    (sets || []).forEach(s => {
      const w = parseFloat(s.weight) || 0, r = parseInt(s.reps) || 0;
      if (r > 0 && (!best || w > best.w || (w === best.w && r > best.r))) best = { w, r };
    });
    return best;
  };
 
  const updateSet = (ex, si, field, val) => { if (locked) return; setData(p => { const dd = { ...(p[dayKey] || {}) }; const s = [...(dd[ex] || [])]; while (s.length <= si) s.push({ reps: "", weight: "" }); s[si] = { ...s[si], [field]: val }; dd[ex] = s; return { ...p, [dayKey]: dd }; }); };
  const addSet = (ex) => {
    if (locked) return;
    setData(p => {
      const dd = { ...(p[dayKey] || {}) }; const s = [...(dd[ex] || [])];
      let pf = { reps: "", weight: "" };
      if (s.length > 0) { const l = s[s.length - 1]; pf = { reps: l.reps || "", weight: l.weight || "" }; }
      else { const pr = getPrev(ex); if (pr && pr.length) pf = { reps: pr[0].reps || "", weight: pr[0].weight || "" }; }
      s.push(pf); dd[ex] = s; return { ...p, [dayKey]: dd };
    });
  };
  const removeSet = (ex, si) => { if (locked) return; setData(p => { const dd = { ...(p[dayKey] || {}) }; const s = [...(dd[ex] || [])]; s.splice(si, 1); if (!s.length) delete dd[ex]; else dd[ex] = s; return { ...p, [dayKey]: dd }; }); };
  const shiftDate = (n) => { const d = new Date(selDate + "T12:00:00"); d.setDate(d.getDate() + n); setSelDate(d.toISOString().split("T")[0]); };
 
  const completeWorkout = async () => {
    if (tSets === 0) { flash("Log at least one set"); return; }
    const nc = { ...completed, [dayKey]: { at: new Date().toISOString(), sets: tSets, reps: tReps } };
    setCompleted(nc);
    await dbSet("completed", nc); await dbSet("data", data);
    flash("Workout complete!");
  };
  const unlockWorkout = () => { if (confirm("Unlock for editing?")) { setCompleted(p => { const n = { ...p }; delete n[dayKey]; return n; }); flash("Unlocked"); } };
 
  const exportData = () => {
    const p = JSON.stringify({ data, config, completed, program, profile, v: "v7", at: new Date().toISOString() });
    if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(p).then(() => flash("Copied!")).catch(() => flash("Copy failed"));
  };
  const importData = (raw) => {
    try {
      const p = JSON.parse(raw.trim());
      if (p.data) setData(p.data); if (p.config) setConfig(p.config); if (p.completed) setCompleted(p.completed);
      if (p.program) { setProgram(p.program); dbSet("program", p.program); }
      if (p.profile) { setProfile(p.profile); dbSet("profile", p.profile); }
      setImportText(""); flash("Imported!");
      if (p.program && p.program.rev === 2) setScreen("main");
    } catch { flash("Import failed"); }
  };
 
  const allKeys = Object.keys(data).filter(k => { const dd = data[k]; return dd && Object.values(dd).some(s => s && s.length && s.some(x => x.reps)); }).sort((a, b) => b.localeCompare(a));
  const weekMap = {};
  allKeys.forEach(k => {
    const d = k.split("::")[0]; const wk = getWeekKey(d);
    if (!weekMap[wk]) weekMap[wk] = { entries: [], tS: 0, tR: 0, days: new Set() };
    weekMap[wk].entries.push(k); weekMap[wk].days.add(d);
    Object.values(data[k]).forEach(ss => { if (ss) ss.forEach(s => { if (s.reps) { weekMap[wk].tS++; weekMap[wk].tR += parseInt(s.reps) || 0; } }); });
  });
  const sortedWeeks = Object.keys(weekMap).sort((a, b) => b.localeCompare(a));
 
  const C = { bg: "#171a1f", cd: "#1e2228", bd: "#2d333b", ac: "#d4a04a", aD: "rgba(212,160,74,0.14)", tx: "#ecede8", mt: "#8b8880", ip: "#252a31", gr: "#5ec98e", rd: "#e86060" };
  const T = {
    toast: { position: "fixed", top: "calc(16px + env(safe-area-inset-top,0px))", left: "50%", transform: "translateX(-50%)", background: C.ac, color: "#111", padding: "8px 24px", borderRadius: 8, fontWeight: 700, fontSize: 13, zIndex: 999 },

    arr: { background: C.cd, border: "1px solid " + C.bd, color: C.tx, width: 36, height: 36, borderRadius: 8, fontSize: 20, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer" },
    pill: { background: C.aD, color: C.ac, padding: "2px 9px", borderRadius: 4, fontSize: 11, fontWeight: 700, fontFamily: "monospace" },

    sec: { fontFamily: "monospace", fontSize: 12, fontWeight: 700, letterSpacing: 2.5, color: C.ac, marginBottom: 14, textTransform: "uppercase" },
    exp: { width: "100%", padding: 12, background: C.aD, color: C.ac, border: "1px solid " + C.ac, borderRadius: 8, fontWeight: 700, fontSize: 13, cursor: "pointer" },

  if (screen === "loading") return (

  return (

      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "16px 16px 10px", borderBottom: "1px solid " + C.bd }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ color: C.ac, fontSize: 20 }}>◈</span>

        </div>
      </div>
 
      {/* Phase banner */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 16px", background: phase.color + "15", borderBottom: "2px solid " + phase.color }}>

          <div>

      <div style={{ display: "flex", background: C.cd, borderBottom: "1px solid " + C.bd }}>

          <div style={{ textAlign: "center" }}>
            <input type="date" value={selDate} onChange={e => setSelDate(e.target.value)} style={{ background: "none", border: "none", color: C.ac, fontSize: 14, fontWeight: 700, textAlign: "center", width: 140, fontFamily: "monospace" }} />
            <div style={{ fontSize: 11, color: C.mt, marginTop: 2 }}>{fmtDate(selDate)}</div>
          </div>
          <button onClick={() => shiftDate(1)} style={T.arr}>›</button>
        </div>
        <div style={{ display: "flex", justifyContent: "center", gap: 28, padding: "8px 0 14px" }}>
          <div style={{ textAlign: "center" }}><div style={{ fontSize: 30, fontWeight: 900, color: C.ac, fontFamily: "monospace" }}>{tSets}</div><div style={{ fontSize: 9, color: C.mt, letterSpacing: 2, fontWeight: 700 }}>SETS</div></div>
          <div style={{ width: 1, height: 30, background: C.bd, alignSelf: "center" }} />
          <div style={{ textAlign: "center" }}><div style={{ fontSize: 30, fontWeight: 900, color: C.ac, fontFamily: "monospace" }}>{tReps}</div><div style={{ fontSize: 9, color: C.mt, letterSpacing: 2, fontWeight: 700 }}>REPS</div></div>
        </div>
        <div style={{ display: "flex", gap: 4, marginBottom: 12, overflowX: "auto", paddingBottom: 4 }}>
          {daysOrder.map((d, i) => {
            const sh = d.replace(/Day \d+ — /, "").split("(")[0].split(":")[0].trim();
            return <button key={d} onClick={() => setSelDay(i)} style={{ display: "flex", flexDirection: "column", alignItems: "center", padding: "8px 6px", borderRadius: 8, border: "1px solid " + (selDay === i ? C.ac : C.bd), background: selDay === i ? C.aD : C.cd, minWidth: 56, gap: 2, flexShrink: 0, cursor: "pointer" }}>
              <span style={{ fontSize: 11, fontWeight: 800, color: C.ac, fontFamily: "monospace" }}>D{i + 1}</span>
              <span style={{ fontSize: 7, color: C.mt, fontWeight: 600, textAlign: "center", lineHeight: 1.2 }}>{sh}</span>
            </button>;
          })}
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}>
          <div style={{ fontSize: 11, fontWeight: 800, color: C.ac, letterSpacing: 1.5, textTransform: "uppercase", fontFamily: "monospace" }}>{daysOrder[selDay]}</div>
          {locked && <span style={{ fontSize: 9, fontWeight: 700, color: C.gr, background: "rgba(94,201,142,0.15)", padding: "3px 8px", borderRadius: 4, fontFamily: "monospace" }}>✓ LOCKED</span>}
        </div>
        {exercises.map((ex, ei) => {
          if (ex.cat === "divider") return <div key={ex.name + ei} style={{ display: "flex", alignItems: "center", gap: 10, margin: "6px 0 2px" }}>
            <div style={{ flex: 1, height: 1, background: C.bd }} />
            <span style={{ fontSize: 8, fontWeight: 800, letterSpacing: 2, color: C.mt, fontFamily: "monospace", whiteSpace: "nowrap" }}>{ex.name.replace(/—/g, "").trim()}</span>
            <div style={{ flex: 1, height: 1, background: C.bd }} />
          </div>;
          const rx = phaseRx(ex.sets, ex.reps, ex.cat, phase);
          const sets = dayData[ex.name] || [];
          const prev = getPrev(ex.name);
          const best = ex.cat === "main" ? prevBest(prev) : null;
          const top = topOfRange(rx.reps);
          const hitTop = ex.cat === "main" && prev && top > 0 && prev.filter(s => s.reps).length > 0 && prev.filter(s => s.reps).every(s => (parseInt(s.reps) || 0) >= top);
          const fk = selDay + "-" + ex.name;
          const fo = showForm[fk];
          const cc = CAT_COLORS[ex.cat] || CAT_COLORS.main;
          return <div key={ex.name} style={{ background: C.cd, borderRadius: 10, border: "1px solid " + C.bd, borderLeft: "3px solid " + cc, padding: "12px 14px", marginBottom: 8, animation: "fadeIn .25s ease both" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 4, flexWrap: "wrap", gap: 6 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ fontFamily: "monospace", fontSize: 10, fontWeight: 700, width: 20, height: 20, borderRadius: 5, display: "flex", alignItems: "center", justifyContent: "center", background: cc + "22", color: cc, flexShrink: 0 }}>{ei + 1}</span>
                <div>
                  <span style={{ fontWeight: 700, fontSize: 13 }}>{ex.name}</span>
                  {ex.cat !== "main" && <span style={{ display: "inline-block", fontSize: 9, fontWeight: 700, padding: "1px 7px", borderRadius: 4, marginLeft: 6, background: cc + "22", color: cc, letterSpacing: .5, textTransform: "uppercase", verticalAlign: "middle" }}>{ex.cat}</span>}
                </div>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ fontSize: 11, fontFamily: "monospace", fontWeight: 700, color: phase.color }}>{rx.sets}×{rx.reps}</span>
                {ex.form && <button onClick={() => setShowForm(p => ({ ...p, [fk]: !p[fk] }))} style={{ background: "none", border: "none", color: C.mt, fontSize: 11, fontWeight: 600, cursor: "pointer" }}>{fo ? "▾ Form" : "▸ Form"}</button>}
              </div>
            </div>
            {fo && <div style={{ fontSize: 12, color: "#a8a39e", lineHeight: 1.5, padding: "8px 10px", background: "rgba(212,160,74,0.07)", borderRadius: 6, marginBottom: 8, borderLeft: "3px solid " + cc }}>{ex.form}</div>}
            {prev && <div style={{ fontSize: 11, color: C.mt, marginBottom: 2, fontStyle: "italic" }}>↩ Last: {prev.map(s => (s.reps || "–") + "×" + (s.weight || "–")).join(", ")}</div>}
            {hitTop && <div style={{ fontSize: 11, color: C.gr, marginBottom: 6, fontWeight: 700 }}>↑ Hit top of range last time — add weight today</div>}
            {sets.map((s, si) => {
              const w = parseFloat(s.weight) || 0, r = parseInt(s.reps) || 0;
              const isPR = best && r > 0 && w > 0 && (w > best.w || (w === best.w && r > best.r));
              return <div key={si} style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 5 }}>

                <input type="number" placeholder="Reps" value={s.reps} min="0" onChange={e => updateSet(ex.name, si, "reps", e.target.value)} disabled={locked} style={{ ...T.inp, ...(locked ? { opacity: .5 } : {}) }} />
                <span style={{ color: C.mt, fontWeight: 700, fontSize: 13 }}>×</span>
                <input type="number" placeholder="lbs" value={s.weight} min="0" onChange={e => updateSet(ex.name, si, "weight", e.target.value)} disabled={locked} style={{ ...T.inp, ...(locked ? { opacity: .5 } : {}) }} />

          </div>;

        {locked ? <div style={{ textAlign: "center", marginTop: 20, padding: 20, background: "rgba(94,201,142,0.1)", border: "2px solid " + C.gr, borderRadius: 10 }}>
          <div style={{ fontSize: 32, color: C.gr }}>✓</div>
          <div style={{ fontSize: 16, fontWeight: 800, color: C.gr, letterSpacing: 1, marginBottom: 4 }}>Workout Completed</div>
          <div style={{ fontSize: 12, color: C.mt, marginBottom: 12, fontFamily: "monospace" }}>{(completed[dayKey] || {}).sets} sets · {(completed[dayKey] || {}).reps} reps</div>
          <button onClick={unlockWorkout} style={{ background: "none", border: "1px solid " + C.bd, color: C.mt, borderRadius: 6, padding: "6px 16px", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>Unlock to Edit</button>

              <div style={{ display: "flex", gap: 18 }}>
                <div style={{ textAlign: "center" }}><div style={{ fontSize: 17, fontWeight: 800, color: C.ac, fontFamily: "monospace" }}>{wd.tS}</div><div style={{ fontSize: 9, color: C.mt, letterSpacing: 1.5 }}>SETS</div>{dS !== null && <div style={{ fontSize: 10, fontWeight: 700, fontFamily: "monospace", color: dS >= 0 ? C.gr : C.rd }}>{dS >= 0 ? "+" : ""}{dS}</div>}</div>
                <div style={{ textAlign: "center" }}><div style={{ fontSize: 17, fontWeight: 800, color: C.ac, fontFamily: "monospace" }}>{wd.tR}</div><div style={{ fontSize: 9, color: C.mt, letterSpacing: 1.5 }}>REPS</div>{dR !== null && <div style={{ fontSize: 10, fontWeight: 700, fontFamily: "monospace", color: dR >= 0 ? C.gr : C.rd }}>{dR >= 0 ? "+" : ""}{dR}</div>}</div>
              </div>
              <span style={{ color: "#666", fontSize: 14 }}>{op ? "▾" : "▸"}</span>
            </div>
            {op && <div style={{ padding: "0 14px 12px", borderTop: "1px solid " + C.bd }}>
              {wd.entries.sort().map(k => {
                const [d, ...r] = k.split("::"); const dd = data[k]; const ents = Object.entries(dd).filter(([, s]) => s && s.length);
                return <div key={k} style={{ padding: "8px 0", borderBottom: "1px solid " + C.bd }}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                    <span style={{ fontSize: 12, fontWeight: 700, color: C.ac }}>{fmtDate(d)}</span>
                    <span style={{ fontSize: 11, color: C.mt }}>{r.join("::").replace(/Day \d+ — /, "").split("(")[0]}</span>
                  </div>
                  {ents.map(([ex, sets]) => <div key={ex} style={{ fontSize: 12, marginTop: 2 }}>
                    <span style={{ color: "#aaa" }}>{ex}: </span>
                    <span style={{ fontSize: 11, color: "#777" }}>{sets.map(s => (s.reps || "–") + "×" + (s.weight || "–")).join(", ")}</span>
                  </div>)}
                </div>;
              })}
            </div>}
          </div>;
        })}
      </div>}
 
      {/* ═══ PROGRAM ═══ */}
      {view === "program" && <div style={{ padding: "16px 14px" }}>
        <div style={T.sec}>{program.name}</div>
        <div style={{ fontSize: 12, color: C.mt, lineHeight: 1.6, marginBottom: 12 }}>{program.desc}</div>
        <div style={{ display: "flex", gap: 4, marginBottom: 14 }}>
          {PHASES.map(p => <div key={p.name} style={{ padding: "8px 6px", borderRadius: 6, border: "2px solid " + (p.name === phase.name ? p.color : "transparent"), background: p.color + "15", textAlign: "center", flex: p.weeks.length, display: "flex", flexDirection: "column", alignItems: "center", gap: 2 }}>
            <span style={{ fontSize: 10, fontWeight: 800, color: p.color }}>{p.name}</span>
            <span style={{ fontSize: 9, color: C.mt }}>W{p.weeks[0]}-{p.weeks[p.weeks.length - 1]}</span>
          </div>)}
        </div>
        {daysOrder.map(day => <div key={day} style={{ ...T.card, padding: 14 }}>
          <div style={{ fontFamily: "monospace", fontSize: 11, fontWeight: 700, color: C.ac, letterSpacing: 1, marginBottom: 10, textTransform: "uppercase" }}>{day}</div>
          {program.days[day].map((ex, ei) => {
            if (ex.cat === "divider") return <div key={ex.name + ei} style={{ display: "flex", alignItems: "center", gap: 10, margin: "10px 0 6px" }}>
              <div style={{ flex: 1, height: 1, background: C.bd }} />
              <span style={{ fontSize: 9, fontWeight: 800, letterSpacing: 2, color: C.mt, fontFamily: "monospace" }}>{ex.name.replace(/—/g, "").trim()}</span>
              <div style={{ flex: 1, height: 1, background: C.bd }} />
            </div>;
            const cc = CAT_COLORS[ex.cat] || CAT_COLORS.main;
            const rx = phaseRx(ex.sets, ex.reps, ex.cat, phase);
            return <div key={ex.name} style={{ marginBottom: 8, paddingBottom: 8, paddingLeft: 8, borderBottom: "1px solid " + C.bd, borderLeft: "3px solid " + cc }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 3 }}>
                <span style={{ fontFamily: "monospace", fontSize: 12, fontWeight: 700, color: cc }}>{ei + 1}.</span>
                <span style={{ fontWeight: 700, fontSize: 13, flex: 1 }}>{ex.name}</span>
                <span style={{ fontFamily: "monospace", fontSize: 11, fontWeight: 700, color: phase.color }}>{rx.sets}×{rx.reps}</span>
              </div>
              {ex.form && <div style={{ fontSize: 11, color: "#9a958f", lineHeight: 1.5, paddingLeft: 20 }}>{ex.form}</div>}
            </div>;
          })}
        </div>)}
      </div>}
 
      {/* ═══ SETTINGS ═══ */}
      {view === "config" && <div style={{ padding: "16px 14px" }}>
        <div style={T.sec}>Settings</div>
        <div style={{ ...T.card, borderColor: "#5ec98e33" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}><span>🟢</span><span style={{ fontWeight: 700 }}>Storage: IndexedDB (auto-saving)</span></div>
        </div>
        <div style={T.card}>
          <div style={{ fontWeight: 700, marginBottom: 4 }}>Export</div>
          <div style={{ fontSize: 11, color: C.mt }}>{Object.keys(data).length} sessions · {Object.keys(completed).length} completed</div>
          <button onClick={exportData} style={{ ...T.exp, marginTop: 10 }}>📋 Export to Clipboard</button>
        </div>
        <div style={T.card}>
          <div style={{ fontWeight: 700, marginBottom: 4 }}>Import</div>
          <textarea value={importText} onChange={e => setImportText(e.target.value)} placeholder="Paste data..." style={{ width: "100%", minHeight: 70, background: C.ip, border: "1px solid " + C.bd, borderRadius: 8, color: C.tx, padding: 10, fontSize: 11, marginTop: 8, resize: "vertical" }} />
          <button onClick={() => importData(importText)} disabled={!importText.trim()} style={{ ...T.exp, marginTop: 6, opacity: importText.trim() ? 1 : .4 }}>📥 Import</button>
        </div>
        <div style={T.card}>
          <div style={{ fontWeight: 700, marginBottom: 4 }}>Program Start Date</div>
          <div style={{ fontSize: 11, color: C.mt, marginBottom: 8 }}>Sets your periodization week. Default lands you in Build (Phase 2).</div>
          <input type="date" value={config.startDate} onChange={e => setConfig(c => ({ ...c, startDate: e.target.value }))} style={{ width: "100%", background: C.ip, border: "1px solid " + C.bd, borderRadius: 8, padding: "10px 14px", color: C.ac, fontSize: 14, fontWeight: 700, fontFamily: "monospace" }} />
          <div style={{ marginTop: 8, fontSize: 12, color: C.mt }}>Current: <span style={{ fontWeight: 700, color: phase.color }}>{phase.name} — W{cw}/10</span></div>
        </div>
        <div style={T.card}>
          <div style={{ fontWeight: 700, marginBottom: 4 }}>Rest Timer Presets</div>
          <div style={{ fontSize: 11, color: C.mt }}>Strength sets (6-8 reps) need 2-3 min. Use the floating timer button on the TRAIN tab.</div>
        </div>
        <div style={T.card}>
          <div style={{ fontWeight: 700, marginBottom: 4 }}>Program</div>
          <div style={{ fontSize: 11, color: C.mt, marginBottom: 8 }}>{program.name} v2 — {daysOrder.length} days</div>
          <button onClick={async () => { if (confirm("Switch program? Your workout data is kept.")) { setProgram(null); await dbSet("program", null); setScreen("landing"); } }} style={T.exp}>Switch Program</button>
        </div>
        <div style={{ ...T.card, borderColor: "#e8606033" }}>
          <div style={{ fontWeight: 700, color: C.rd, marginBottom: 4 }}>Danger Zone</div>
          <button onClick={() => { if (confirm("Reset ALL workout data?")) { setData({}); setCompleted({}); dbSet("data", {}); dbSet("completed", {}); flash("Cleared"); } }} style={{ background: "none", border: "1px solid " + C.rd, color: C.rd, borderRadius: 8, padding: "10px 24px", fontWeight: 700, fontSize: 12, cursor: "pointer" }}>Reset All Data</button>
        </div>
      </div>}
 
      {/* ═══ REST TIMER (floating) ═══ */}
      {view === "train" && <div style={{ position: "fixed", bottom: "calc(16px + env(safe-area-inset-bottom,0px))", right: 16, zIndex: 200, display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 8 }}>
        {timerOpen && !timerEnd && <div style={{ display: "flex", gap: 6, background: C.cd, border: "1px solid " + C.bd, borderRadius: 10, padding: 8 }}>
          {[[90, "1:30"], [120, "2:00"], [180, "3:00"]].map(([s, l]) =>
            <button key={s} onClick={() => startTimer(s)} style={{ background: C.aD, color: C.ac, border: "1px solid " + C.ac, borderRadius: 8, padding: "8px 14px", fontWeight: 700, fontSize: 13, fontFamily: "monospace", cursor: "pointer" }}>{l}</button>
          )}
        </div>}
        {timerEnd ? (
          <button onClick={() => { setTimerEnd(null); setTimerOpen(false); }} style={{ background: timerDone ? C.gr : C.cd, border: "2px solid " + (timerDone ? C.gr : C.ac), borderRadius: 12, padding: "12px 20px", fontWeight: 800, fontSize: 18, fontFamily: "monospace", color: timerDone ? "#fff" : C.ac, cursor: "pointer", animation: timerDone ? "pulse 1s ease infinite" : "none" }}>
            {timerDone ? "REST DONE ✕" : fmtTimer(timerLeft) + " ✕"}
          </button>
        ) : (
          <button onClick={() => setTimerOpen(o => !o)} style={{ background: C.cd, border: "1px solid " + C.ac, borderRadius: "50%", width: 52, height: 52, fontSize: 22, color: C.ac, cursor: "pointer", boxShadow: "0 4px 12px rgba(0,0,0,0.4)" }}>⏱</button>
        )}
      </div>}
    </div>
  );
}
 
ReactDOM.render(<App />, document.getElementById("root"));
 
</script>
</body>
</html>
