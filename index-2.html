// ─── IndexedDB Storage ──────────────────────────────────────────────
const DB_NAME = "IronLogDB";
const DB_STORE = "appdata";
const openDB = () => new Promise((resolve, reject) => {
  const req = indexedDB.open(DB_NAME, 1);
  req.onupgradeneeded = (e) => e.target.result.createObjectStore(DB_STORE);
  req.onsuccess = (e) => resolve(e.target.result);
  req.onerror = (e) => reject(e.target.error);
});
const dbSet = async (key, val) => {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(DB_STORE, "readwrite");
    tx.objectStore(DB_STORE).put(val, key);
    tx.oncomplete = () => res(true);
    tx.onerror = (e) => rej(e.target.error);
  });
};
const dbGet = async (key) => {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(DB_STORE, "readonly");
    const req = tx.objectStore(DB_STORE).get(key);
    req.onsuccess = () => res(req.result ?? null);
    req.onerror = (e) => rej(e.target.error);
  });
};

// ─── Periodization ──────────────────────────────────────────────────
const PHASES = [
  { name: "Foundation", weeks: [1,2,3], color: "#5ec98e", desc: "Rebuild patterns · High reps · Moderate load", icon: "▣" },
  { name: "Build", weeks: [4,5,6], color: "#d4a04a", desc: "Add volume · Tighten reps · Push intensity", icon: "▲" },
  { name: "Strength", weeks: [7,8,9], color: "#e86060", desc: "Heavy loads · Low reps · Peak output", icon: "◆" },
  { name: "Deload", weeks: [10], color: "#70b8e0", desc: "Cut volume 40% · Recover · Reset", icon: "○" },
];
const getPhase = (wn) => { const cw = ((wn-1)%10)+1; return PHASES.find(p=>p.weeks.includes(cw))||PHASES[0]; };
const getCycleWeek = (wn) => ((wn-1)%10)+1;
const phaseRx = (s, r, cat, ph) => {
  if(cat==="warmup"||cat==="mobility"||cat==="divider") return {sets:s,reps:r};
  const p=ph.name;
  if(cat==="core"){ return p==="Deload"?{sets:Math.max(1,s-1),reps:r}:(p==="Build"||p==="Strength")?{sets:s+1,reps:r}:{sets:s,reps:r}; }
  if(p==="Foundation") return {sets:s,reps:bumpR(r,2)};
  if(p==="Build") return {sets:s+1,reps:r};
  if(p==="Strength") return {sets:s,reps:dropR(r,2)};
  if(p==="Deload") return {sets:Math.max(2,s-1),reps:r};
  return {sets:s,reps:r};
};
const bumpR = (r, n) => {
  if (typeof r !== "string" || /sec|yd|each way/.test(r)) return r;
  const m = r.match(/^(\d+)-(\d+)/);
  if (m) return (+m[1]+n) + "-" + (+m[2]+n);
  const m2 = r.match(/^(\d+)/);
  if (m2) return r.replace(m2[1], String(+m2[1]+n));
  return r;
};
const dropR = (r, n) => {
  if (typeof r !== "string" || /sec|yd|each way/.test(r)) return r;
  const m = r.match(/^(\d+)-(\d+)/);
  if (m) return Math.max(3,+m[1]-n) + "-" + Math.max(5,+m[2]-n);
  const m2 = r.match(/^(\d+)/);
  if (m2) return r.replace(m2[1], String(Math.max(3,+m2[1]-n)));
  return r;
};

// Normalize exercise format
const normEx = (ex) => ex.n ? { name:ex.n, sets:ex.s, reps:ex.r, form:ex.f, cat:{main:"main",core:"core",mob:"mobility",wu:"warmup",d:"divider"}[ex.c]||ex.c } : ex;
const CAT_COLORS = { main:"#d4a04a", core:"#5ec98e", mobility:"#70b8e0", warmup:"#e8a060", divider:"#555" };
const getToday = () => new Date().toISOString().split("T")[0];
const fmtDate = (d) => new Date(d+"T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
const weeksSinceStart = (s,c) => Math.max(1,Math.floor((new Date(c+"T12:00:00")-new Date(s+"T12:00:00"))/864e5/7)+1);
const getWeekKey = (d) => { const dt=new Date(d+"T12:00:00"),yr=dt.getFullYear(),j=new Date(yr,0,1); return yr+"-W"+String(Math.ceil(((dt-j)/864e5+j.getDay()+1)/7)).padStart(2,"0"); };

// ═══ APP ════════════════════════════════════════════════════════════

  const [toast,setToast]=useState(null);
  const [expWeeks,setExpWeeks]=useState({});
  const [importText,setImportText]=useState("");
  const tRef=useRef();
  const saveSkip=useRef({d:0,c:0,cp:0});

  useEffect(()=>{(async()=>{
    try {
      const p=await dbGet("program"); const d=await dbGet("data"); const cfg=await dbGet("config"); const cp=await dbGet("completed"); const pr=await dbGet("profile");
      if(p)setProgram(p); if(d)setData(d); if(cfg)setConfig(cfg); if(cp)setCompleted(cp); if(pr)setProfile(pr);
      setScreen(p?"main":"landing");
    } catch(e) { console.error(e); setScreen("landing"); }
  })();},[]);

  useEffect(()=>{if(screen==="main"){if(saveSkip.current.d++>0)dbSet("data",data).catch(()=>{});}},[data]);
  useEffect(()=>{if(screen==="main"){if(saveSkip.current.c++>0)dbSet("config",config).catch(()=>{});}},[config]);
  useEffect(()=>{if(screen==="main"){if(saveSkip.current.cp++>0)dbSet("completed",completed).catch(()=>{});}},[completed]);

  const flash=(m)=>{setToast(m);clearTimeout(tRef.current);tRef.current=setTimeout(()=>setToast(null),2200);};

  const selectPreset = async () => {
    const prog = {};
    Object.entries(BRIANS_WORKOUT.days).forEach(([day,exs])=>{ prog[day]=exs.map(normEx); });
    const p = {name:BRIANS_WORKOUT.name, desc:BRIANS_WORKOUT.desc, days:prog};
    setProgram(p); setProfile(BRIANS_WORKOUT.profile);
    await dbSet("program",p); await dbSet("profile",BRIANS_WORKOUT.profile);
    setScreen("main"); flash("Brian's Workout loaded!");
  };

  const daysOrder = program ? Object.keys(program.days) : [];
  const dayKey = daysOrder.length ? selDate+"::"+daysOrder[selDay] : "";
  const dayData = data[dayKey]||{};
  const exercises = program ? (program.days[daysOrder[selDay]]||[]) : [];
  const wn = weeksSinceStart(config.startDate,selDate);
  const phase = getPhase(wn);
  const cw = getCycleWeek(wn);
  const locked = !!completed[dayKey];

  const tSets = Object.values(dayData).reduce((a,s)=>a+(s?s.filter(x=>x.reps).length:0),0);
  const tReps = Object.values(dayData).reduce((a,s)=>a+(s?s.reduce((b,x)=>b+(parseInt(x.reps)||0),0):0),0);

  const upd=(ex,si,field,val)=>{if(locked)return;setData(p=>{const dd={...(p[dayKey]||{})};const s=[...(dd[ex]||[])];while(s.length<=si)s.push({reps:"",weight:""});s[si]={...s[si],[field]:val};dd[ex]=s;return{...p,[dayKey]:dd};});};
  const addS=(ex)=>{if(locked)return;setData(p=>{const dd={...(p[dayKey]||{})};const s=[...(dd[ex]||[])];let pf={reps:"",weight:""};if(s.length>0){const l=s[s.length-1];pf={reps:l.reps||"",weight:l.weight||""};}else{const pr=getPrv(ex);if(pr&&pr.length)pf={reps:pr[0].reps||"",weight:pr[0].weight||""};}s.push(pf);dd[ex]=s;return{...p,[dayKey]:dd};});};
  const remS=(ex,si)=>{if(locked)return;setData(p=>{const dd={...(p[dayKey]||{})};const s=[...(dd[ex]||[])];s.splice(si,1);if(!s.length)delete dd[ex];else dd[ex]=s;return{...p,[dayKey]:dd};});};
  const getPrv=(ex)=>{if(!daysOrder[selDay])return null;const e=Object.entries(data).filter(([k])=>k.endsWith(daysOrder[selDay])&&k!==dayKey).sort(([a],[b])=>b.localeCompare(a));for(const[,dd]of e){if(dd[ex]&&dd[ex].length)return dd[ex];}return null;};
  const shiftD=(n)=>{const d=new Date(selDate+"T12:00:00");d.setDate(d.getDate()+n);setSelDate(d.toISOString().split("T")[0]);};

  const complete=async()=>{if(tSets===0){flash("Log at least one set");return;}const nc={...completed,[dayKey]:{at:new Date().toISOString(),sets:tSets,reps:tReps}};setCompleted(nc);await dbSet("completed",nc);await dbSet("data",data);flash("Workout complete!");};
  const unlock=()=>{if(confirm("Unlock for editing?")){setCompleted(p=>{const n={...p};delete n[dayKey];return n;});flash("Unlocked");}};

  const exportD=()=>{const p=JSON.stringify({data,config,completed,program,profile,v:"v6",at:new Date().toISOString()});if(navigator.clipboard?.writeText)navigator.clipboard.writeText(p).then(()=>flash("Copied!")).catch(()=>flash("Copy failed"));};
  const importD=(raw)=>{try{const p=JSON.parse(raw.trim());if(p.data)setData(p.data);if(p.config)setConfig(p.config);if(p.completed)setCompleted(p.completed);if(p.program){setProgram(p.program);dbSet("program",p.program);}if(p.profile){setProfile(p.profile);dbSet("profile",p.profile);}setImportText("");flash("Imported!");if(!program&&p.program)setScreen("main");}catch{flash("Import failed");}};

  const allKeys=Object.keys(data).filter(k=>{const dd=data[k];return dd&&Object.values(dd).some(s=>s&&s.length&&s.some(x=>x.reps));}).sort((a,b)=>b.localeCompare(a));
  const wkMap={};allKeys.forEach(k=>{const d=k.split("::")[0];const wk=getWeekKey(d);if(!wkMap[wk])wkMap[wk]={entries:[],tS:0,tR:0,days:new Set()};wkMap[wk].entries.push(k);wkMap[wk].days.add(d);Object.values(data[k]).forEach(sets=>{if(sets)sets.forEach(s=>{if(s.reps){wkMap[wk].tS++;wkMap[wk].tR+=parseInt(s.reps)||0;}});});});
  const sWeeks=Object.keys(wkMap).sort((a,b)=>b.localeCompare(a));

  const C={bg:"#171a1f",card:"#1e2228",brd:"#2d333b",acc:"#d4a04a",accD:"rgba(212,160,74,0.14)",txt:"#ecede8",mut:"#8b8880",inp:"#252a31"};

  // ═══ LOADING
  if(screen==="loading") return <div style={{display:"flex",justifyContent:"center",alignItems:"center",height:"100vh",background:C.bg}}><div style={{width:28,height:28,borderRadius:"50%",border:"3px solid "+C.brd,borderTopColor:C.acc,animation:"spin .8s linear infinite"}}/><style>{"@keyframes spin{to{transform:rotate(360deg)}}"}</style></div>;

  // ═══ LANDING
  if(screen==="landing") return (
    <div style={{background:C.bg,minHeight:"100vh",padding:"36px 20px",fontFamily:"'Outfit',sans-serif",color:C.txt,maxWidth:540,margin:"0 auto"}}>
      {toast&&<div style={T.toast}>{toast}</div>}
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
        <span style={{color:C.acc,fontSize:28,fontWeight:900}}>◈</span>
        <span style={{fontFamily:"monospace",fontSize:22,fontWeight:700,letterSpacing:5,color:C.acc}}>IRON LOG</span>
      </div>
      <h1 style={{fontSize:34,fontWeight:900,lineHeight:1.15,margin:"24px 0 12px"}}>Your gym.<br/>Your <em style={{fontStyle:"italic",color:C.acc}}>plan</em>.<br/>Your rules.</h1>
      <p style={{fontSize:14,color:C.mut,lineHeight:1.6,marginBottom:28}}>Choose a pre-built program or import your existing data.</p>

      <div onClick={selectPreset} style={{background:C.card,border:"1px solid "+C.brd,borderRadius:14,padding:20,marginBottom:12,cursor:"pointer",position:"relative"}}>
        <span style={{position:"absolute",top:12,right:12,fontSize:9,fontWeight:700,padding:"3px 10px",borderRadius:4,letterSpacing:1,background:C.accD,color:C.acc,fontFamily:"monospace"}}>PRESET</span>
        <h3 style={{fontSize:16,fontWeight:800,color:C.acc,marginBottom:6}}>◈ Brian's Workout</h3>
        <p style={{fontSize:12,color:C.mut,lineHeight:1.5}}>6-day leg-biased PPL. Legs 3x/week, upper body 2x/week. Auto-periodized with core & mobility every session. L4/L5 disc-safe.</p>
      </div>

      <div style={{background:C.card,border:"1px dashed "+C.brd,borderRadius:14,padding:20}}>
        <h3 style={{fontSize:16,fontWeight:800,color:C.mut,marginBottom:6}}>↑ Import Existing Data</h3>
        <p style={{fontSize:12,color:C.mut,lineHeight:1.5,marginBottom:8}}>Paste previously exported data to restore.</p>
        <textarea value={importText} onChange={e=>setImportText(e.target.value)} placeholder="Paste export data..." style={{width:"100%",minHeight:70,background:C.inp,border:"1px solid "+C.brd,borderRadius:8,color:C.txt,padding:10,fontSize:11,fontFamily:"monospace",resize:"vertical"}}/>
        {importText.trim()&&<button onClick={()=>importD(importText)} style={{width:"100%",padding:12,marginTop:8,background:C.accD,color:C.acc,border:"1px solid "+C.acc,borderRadius:8,fontWeight:700,fontSize:13}}>Import</button>}
      </div>
    </div>
  );

  if(!program) return null;

  // ═══ MAIN
  return (
    <div style={{background:C.bg,minHeight:"100vh",fontFamily:"'Outfit',sans-serif",color:C.txt,maxWidth:540,margin:"0 auto",paddingBottom:70}}>
      <style>{"@keyframes spin{to{transform:rotate(360deg)}} @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}"}</style>
      {toast&&<div style={T.toast}>{toast}</div>}

      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px 16px 10px",borderBottom:"1px solid "+C.brd}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{color:C.acc,fontSize:20}}>◈</span>
          <span style={{fontFamily:"monospace",fontSize:15,fontWeight:700,letterSpacing:4,color:C.acc}}>IRON LOG</span>
        </div>
        <div style={{display:"flex",gap:6}}>
          {[profile.height,profile.weight,profile.age].filter(Boolean).map((v,i)=><span key={i} style={{background:C.accD,color:C.acc,padding:"3px 10px",borderRadius:5,fontSize:11,fontWeight:700}}>{v}</span>)}
        </div>
      </div>

      {/* Phase */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 16px",background:phase.color+"15",borderBottom:"2px solid "+phase.color}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:20,fontWeight:900,color:phase.color}}>{phase.icon}</span>
          <div><div style={{fontSize:14,fontWeight:800,letterSpacing:1,color:phase.color}}>{phase.name} Phase</div><div style={{fontSize:10,color:C.mut}}>{phase.desc}</div></div>
        </div>
        <div style={{textAlign:"center"}}><div style={{fontSize:22,fontWeight:900,fontFamily:"monospace",color:phase.color}}>W{cw}</div><div style={{fontSize:9,color:C.mut}}>of 10</div></div>
      </div>

      {/* Nav */}
      <div style={{display:"flex",background:C.card,borderBottom:"1px solid "+C.brd}}>
        {[["train","TRAIN"],["history","HISTORY"],["weekly","WEEKLY"],["program","PROGRAM"],["config","⚙"]].map(([id,lbl])=>
          <button key={id} onClick={()=>setView(id)} style={{flex:1,padding:"12px 0",background:"none",border:"none",borderBottom:view===id?"2px solid "+C.acc:"2px solid transparent",color:view===id?C.acc:C.mut,fontWeight:700,fontSize:10,letterSpacing:1.5,fontFamily:"monospace",cursor:"pointer"}}>{lbl}</button>
        )}
      </div>

      {/* ═══ TRAIN */}
      {view==="train"&&<div style={{padding:"16px 14px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
          <button onClick={()=>shiftD(-1)} style={T.dateArr}>‹</button>
          <div style={{textAlign:"center"}}><input type="date" value={selDate} onChange={e=>setSelDate(e.target.value)} style={{background:"none",border:"none",color:C.acc,fontSize:14,fontWeight:700,textAlign:"center",width:140,fontFamily:"monospace"}}/><div style={{fontSize:11,color:C.mut,marginTop:2}}>{fmtDate(selDate)}</div></div>
          <button onClick={()=>shiftD(1)} style={T.dateArr}>›</button>
        </div>
        <div style={{display:"flex",justifyContent:"center",gap:28,padding:"8px 0 14px"}}>
          <div style={{textAlign:"center"}}><div style={{fontSize:30,fontWeight:900,color:C.acc,fontFamily:"monospace"}}>{tSets}</div><div style={{fontSize:9,color:C.mut,letterSpacing:2,fontWeight:700}}>SETS</div></div>
          <div style={{width:1,height:30,background:C.brd,alignSelf:"center"}}/>
          <div style={{textAlign:"center"}}><div style={{fontSize:30,fontWeight:900,color:C.acc,fontFamily:"monospace"}}>{tReps}</div><div style={{fontSize:9,color:C.mut,letterSpacing:2,fontWeight:700}}>REPS</div></div>
        </div>
        <div style={{display:"flex",gap:4,marginBottom:12,overflowX:"auto",paddingBottom:4}}>
          {daysOrder.map((d,i)=>{const sh=d.replace(/Day \d+ — /,"").split("(")[0].split(":")[0].trim();
            return <button key={d} onClick={()=>setSelDay(i)} style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"8px 6px",borderRadius:8,border:"1px solid "+(selDay===i?C.acc:C.brd),background:selDay===i?C.accD:C.card,minWidth:52,gap:2,flexShrink:0,cursor:"pointer"}}>
              <span style={{fontSize:11,fontWeight:800,color:C.acc,fontFamily:"monospace"}}>D{i+1}</span>
              <span style={{fontSize:7,color:C.mut,fontWeight:600,textAlign:"center",lineHeight:1.2}}>{sh}</span>
            </button>;
          })}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
          <div style={{fontSize:11,fontWeight:800,color:C.acc,letterSpacing:1.5,textTransform:"uppercase",fontFamily:"monospace"}}>{daysOrder[selDay]}</div>
          {locked&&<span style={{fontSize:9,fontWeight:700,color:"#5ec98e",background:"rgba(94,201,142,0.15)",padding:"3px 8px",borderRadius:4,fontFamily:"monospace"}}>✓ LOCKED</span>}
        </div>
        {exercises.map((ex,ei)=>{
          if(ex.cat==="divider")return <div key={ex.name+ei} style={{display:"flex",alignItems:"center",gap:10,margin:"6px 0 2px"}}><div style={{flex:1,height:1,background:C.brd}}/><span style={{fontSize:8,fontWeight:800,letterSpacing:2,color:C.mut,fontFamily:"monospace",whiteSpace:"nowrap"}}>{ex.name.replace(/—/g,"").trim()}</span><div style={{flex:1,height:1,background:C.brd}}/></div>;
          const rx=phaseRx(ex.sets,ex.reps,ex.cat,phase);const sets=dayData[ex.name]||[];const prev=getPrv(ex.name);const fk=selDay+"-"+ex.name;const fo=showForm[fk];const cc=CAT_COLORS[ex.cat]||CAT_COLORS.main;
          return <div key={ex.name} style={{background:C.card,borderRadius:10,border:"1px solid "+C.brd,borderLeft:"3px solid "+cc,padding:"12px 14px",marginBottom:8,animation:"fadeIn .25s ease both",animationDelay:ei*0.03+"s"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4,flexWrap:"wrap",gap:6}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontFamily:"monospace",fontSize:10,fontWeight:700,width:20,height:20,borderRadius:5,display:"flex",alignItems:"center",justifyContent:"center",background:cc+"22",color:cc}}>{ei+1}</span>
                <div><span style={{fontWeight:700,fontSize:13}}>{ex.name}</span>{ex.cat!=="main"&&<span style={{display:"inline-block",fontSize:9,fontWeight:700,padding:"1px 7px",borderRadius:4,marginLeft:6,background:cc+"22",color:cc,letterSpacing:.5,textTransform:"uppercase",verticalAlign:"middle"}}>{ex.cat}</span>}</div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:11,fontFamily:"monospace",fontWeight:700,color:phase.color}}>{rx.sets}×{rx.reps}</span>
                {ex.form&&<button onClick={()=>setShowForm(p=>({...p,[fk]:!p[fk]}))} style={{background:"none",border:"none",color:C.mut,fontSize:11,fontWeight:600,cursor:"pointer"}}>{fo?"▾ Form":"▸ Form"}</button>}
              </div>
            </div>
            {fo&&<div style={{fontSize:12,color:"#a8a39e",lineHeight:1.5,padding:"8px 10px",background:"rgba(212,160,74,0.07)",borderRadius:6,marginBottom:8,borderLeft:"3px solid "+cc}}>{ex.form}</div>}
            {prev&&<div style={{fontSize:11,color:C.mut,marginBottom:6,fontStyle:"italic"}}>↩ Last: {prev.map(s=>(s.reps||"–")+"×"+(s.weight||"–")).join(", ")}</div>}
            {sets.map((s,si)=><div key={si} style={{display:"flex",alignItems:"center",gap:6,marginBottom:5}}>
              <span style={{fontFamily:"monospace",fontSize:11,fontWeight:700,width:24,textAlign:"center",color:cc}}>S{si+1}</span>
              <input type="number" placeholder="Reps" value={s.reps} min="0" onChange={e=>upd(ex.name,si,"reps",e.target.value)} disabled={locked} style={{...T.inp,...(locked?{opacity:.5}:{})}}/>
              <span style={{color:C.mut,fontWeight:700,fontSize:13}}>×</span>
              <input type="number" placeholder="lbs" value={s.weight} min="0" onChange={e=>upd(ex.name,si,"weight",e.target.value)} disabled={locked} style={{...T.inp,...(locked?{opacity:.5}:{})}}/>
              {!locked&&<button onClick={()=>remS(ex.name,si)} style={{background:"none",border:"none",color:C.mut,fontSize:12,padding:"2px 6px",cursor:"pointer"}}>✕</button>}
            </div>)}
            {!locked&&<button onClick={()=>addS(ex.name)} style={{border:"none",borderRadius:6,padding:"6px 0",fontWeight:700,fontSize:11,width:"100%",marginTop:6,color:cc,background:cc+"18",cursor:"pointer"}}>+ Add Set</button>}
          </div>;
        })}
        {locked?<div style={{textAlign:"center",marginTop:20,padding:20,background:"rgba(94,201,142,0.1)",border:"2px solid #5ec98e",borderRadius:10}}>
          <div style={{fontSize:32,color:"#5ec98e"}}>✓</div><div style={{fontSize:16,fontWeight:800,color:"#5ec98e",letterSpacing:1,marginBottom:4}}>Workout Completed</div>
          <div style={{fontSize:12,color:C.mut,marginBottom:12,fontFamily:"monospace"}}>{completed[dayKey]?.sets} sets · {completed[dayKey]?.reps} reps</div>
          <button onClick={unlock} style={{background:"none",border:"1px solid "+C.brd,color:C.mut,borderRadius:6,padding:"6px 16px",fontSize:11,fontWeight:600,cursor:"pointer"}}>Unlock to Edit</button>
        </div>:<button onClick={complete} style={{width:"100%",padding:16,marginTop:20,background:"#5ec98e",color:"#fff",border:"none",borderRadius:10,fontSize:15,fontWeight:800,letterSpacing:1.5,textTransform:"uppercase",cursor:"pointer"}}>✓ Complete Workout</button>}
      </div>}

      {/* ═══ HISTORY */}
      {view==="history"&&<div style={{padding:"16px 14px"}}>
        <div style={T.secTitle}>Session History</div>
        {!allKeys.length&&<div style={{color:C.mut,fontSize:13,textAlign:"center",padding:40}}>No sessions logged yet.</div>}
        {allKeys.map(k=>{const[date,...rest]=k.split("::");const dl=rest.join("::");const dd=data[k];const ents=Object.entries(dd).filter(([,s])=>s&&s.length);const ts=ents.reduce((a,[,s])=>a+s.filter(x=>x.reps).length,0);const tr=ents.reduce((a,[,s])=>a+s.reduce((b,x)=>b+(parseInt(x.reps)||0),0),0);const w=weeksSinceStart(config.startDate,date);const ph=getPhase(w);
          return <div key={k} style={{background:C.card,borderRadius:10,border:"1px solid "+C.brd,padding:"12px 14px",marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,flexWrap:"wrap",gap:6}}>
              <div><div style={{fontWeight:700,fontSize:14}}>{fmtDate(date)}</div><div style={{fontSize:11,color:C.mut}}>{dl.replace(/Day \d+ — /,"")}</div></div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{padding:"2px 8px",borderRadius:4,fontSize:10,fontWeight:700,background:ph.color+"22",color:ph.color}}>{ph.icon} {ph.name}</span>
                <span style={{...T.pill}}>{ts}S</span><span style={{...T.pill}}>{tr}R</span>
              </div>
            </div>
            {ents.map(([ex,sets])=><div key={ex} style={{marginBottom:4}}><span style={{fontSize:12,fontWeight:700}}>{ex}</span><br/><span style={{fontSize:11,color:C.mut}}>{sets.map(s=>(s.reps||"–")+"×"+(s.weight||"–")).join("  ·  ")}</span></div>)}
          </div>;
        })}
      </div>}

      {/* ═══ WEEKLY */}
      {view==="weekly"&&<div style={{padding:"16px 14px"}}>
        <div style={T.secTitle}>Week-over-Week</div>
        {!sWeeks.length&&<div style={{color:C.mut,fontSize:13,textAlign:"center",padding:40}}>No data yet.</div>}
        {sWeeks.map((wk,wi)=>{const wd=wkMap[wk];const pv=sWeeks[wi+1]?wkMap[sWeeks[wi+1]]:null;const dS=pv?wd.tS-pv.tS:null;const dR=pv?wd.tR-pv.tR:null;const op=expWeeks[wk];
          return <div key={wk} style={{background:C.card,borderRadius:10,border:"1px solid "+C.brd,marginBottom:10,overflow:"hidden"}}>
            <div onClick={()=>setExpWeeks(p=>({...p,[wk]:!p[wk]}))} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 14px",cursor:"pointer"}}>
              <div><div style={{fontWeight:700,fontSize:14,fontFamily:"monospace"}}>{wk}</div><div style={{fontSize:11,color:C.mut}}>{wd.days.size} day{wd.days.size!==1?"s":""}</div></div>
              <div style={{display:"flex",gap:18}}>
                <div style={{textAlign:"center"}}><div style={{fontSize:17,fontWeight:800,color:C.acc,fontFamily:"monospace"}}>{wd.tS}</div><div style={{fontSize:9,color:C.mut,letterSpacing:1.5}}>SETS</div>{dS!==null&&<div style={{fontSize:10,fontWeight:700,fontFamily:"monospace",color:dS>=0?"#5ec98e":"#e86060"}}>{dS>=0?"+":""}{dS}</div>}</div>
                <div style={{textAlign:"center"}}><div style={{fontSize:17,fontWeight:800,color:C.acc,fontFamily:"monospace"}}>{wd.tR}</div><div style={{fontSize:9,color:C.mut,letterSpacing:1.5}}>REPS</div>{dR!==null&&<div style={{fontSize:10,fontWeight:700,fontFamily:"monospace",color:dR>=0?"#5ec98e":"#e86060"}}>{dR>=0?"+":""}{dR}</div>}</div>
              </div>
              <span style={{color:"#666",fontSize:14}}>{op?"▾":"▸"}</span>
            </div>
            {op&&<div style={{padding:"0 14px 12px",borderTop:"1px solid "+C.brd}}>{wd.entries.sort().map(k=>{const[d,...r]=k.split("::");const dd=data[k];const ents=Object.entries(dd).filter(([,s])=>s&&s.length);
              return <div key={k} style={{padding:"8px 0",borderBottom:"1px solid "+C.brd}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:12,fontWeight:700,color:C.acc}}>{fmtDate(d)}</span><span style={{fontSize:11,color:C.mut}}>{r.join("::").replace(/Day \d+ — /,"").split("(")[0]}</span></div>
                {ents.map(([ex,sets])=><div key={ex} style={{fontSize:12,marginTop:2}}><span style={{color:"#aaa"}}>{ex}:</span> <span style={{fontSize:11,color:"#777"}}>{sets.map(s=>(s.reps||"–")+"×"+(s.weight||"–")).join(", ")}</span></div>)}
              </div>;})}</div>}
          </div>;
        })}
      </div>}

      {/* ═══ PROGRAM */}
      {view==="program"&&<div style={{padding:"16px 14px"}}>
        <div style={T.secTitle}>{program.name||"Your Program"}</div>
        <div style={{fontSize:12,color:C.mut,lineHeight:1.6,marginBottom:12}}>{program.desc}</div>
        <div style={{display:"flex",gap:4,marginBottom:14}}>{PHASES.map(p=><div key={p.name} style={{padding:"8px 6px",borderRadius:6,border:"2px solid "+(p.name===phase.name?p.color:"transparent"),background:p.color+"15",textAlign:"center",flex:p.weeks.length,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
          <span style={{fontSize:14,color:p.color}}>{p.icon}</span><span style={{fontSize:10,fontWeight:800,color:p.color}}>{p.name}</span><span style={{fontSize:9,color:C.mut}}>W{p.weeks[0]}-{p.weeks[p.weeks.length-1]}</span>
        </div>)}</div>
        {daysOrder.map(day=><div key={day} style={{background:C.card,borderRadius:10,border:"1px solid "+C.brd,padding:14,marginBottom:12}}>
          <div style={{fontFamily:"monospace",fontSize:11,fontWeight:700,color:C.acc,letterSpacing:1,marginBottom:10,textTransform:"uppercase"}}>{day}</div>
          {program.days[day].map((ex,ei)=>{
            if(ex.cat==="divider") return <div key={ex.name+ei} style={{display:"flex",alignItems:"center",gap:10,margin:"10px 0 6px"}}><div style={{flex:1,height:1,background:C.brd}}/><span style={{fontSize:10,fontWeight:800,letterSpacing:2,color:C.mut,fontFamily:"monospace"}}>{ex.name.replace(/—/g,"").trim()}</span><div style={{flex:1,height:1,background:C.brd}}/></div>;
            const cc=CAT_COLORS[ex.cat]||CAT_COLORS.main;const rx=phaseRx(ex.sets,ex.reps,ex.cat,phase);
            return <div key={ex.name} style={{marginBottom:8,paddingBottom:8,paddingLeft:8,borderBottom:"1px solid "+C.brd,borderLeft:"3px solid "+cc}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
                <span style={{fontFamily:"monospace",fontSize:12,fontWeight:700,color:cc}}>{ei+1}.</span>
                <span style={{fontWeight:700,fontSize:13,flex:1}}>{ex.name}</span>
                <span style={{fontFamily:"monospace",fontSize:11,fontWeight:700,color:phase.color}}>{rx.sets}×{rx.reps}</span>
              </div>
              {ex.form&&<div style={{fontSize:11,color:"#9a958f",lineHeight:1.5,paddingLeft:20}}>{ex.form}</div>}
            </div>;
          })}
        </div>)}
      </div>}

      {/* ═══ SETTINGS */}
      {view==="config"&&<div style={{padding:"16px 14px"}}>
        <div style={T.secTitle}>Settings</div>
        <div style={{...T.card,borderColor:"#5ec98e33"}}><div style={{display:"flex",alignItems:"center",gap:8}}><span>🟢</span><span style={{fontWeight:700}}>Storage: IndexedDB (auto-saving)</span></div></div>
        <div style={T.card}><div style={{fontWeight:700,marginBottom:4}}>Export</div><div style={{fontSize:11,color:C.mut}}>{Object.keys(data).length} sessions · {Object.keys(completed).length} completed</div><button onClick={exportD} style={{...T.expBtn,marginTop:10}}>📋 Export to Clipboard</button></div>
        <div style={T.card}><div style={{fontWeight:700,marginBottom:4}}>Import</div><textarea value={importText} onChange={e=>setImportText(e.target.value)} placeholder="Paste data..." style={T.impArea}/><button onClick={()=>importD(importText)} disabled={!importText.trim()} style={{...T.expBtn,marginTop:6,opacity:importText.trim()?1:.4}}>📥 Import</button></div>
        <div style={T.card}><div style={{fontWeight:700,marginBottom:4}}>Start Date</div><input type="date" value={config.startDate} onChange={e=>setConfig(c=>({...c,startDate:e.target.value}))} style={{width:"100%",background:C.inp,border:"1px solid "+C.brd,borderRadius:8,padding:"10px 14px",color:C.acc,fontSize:14,fontWeight:700,fontFamily:"monospace"}}/><div style={{marginTop:8,fontSize:12,color:C.mut}}>Current: <span style={{fontWeight:700,color:phase.color}}>{phase.icon} {phase.name} — W{cw}/10</span></div></div>
        <div style={T.card}><div style={{fontWeight:700,marginBottom:4}}>Program</div><div style={{fontSize:11,color:C.mut,marginBottom:8}}>{program.name} — {daysOrder.length} days</div><button onClick={async()=>{if(confirm("Switch program?")){setProgram(null);await dbSet("program",null);setScreen("landing");}}} style={T.expBtn}>Switch Program</button></div>
        <div style={{...T.card,borderColor:"#e8606033"}}><div style={{fontWeight:700,color:"#e86060",marginBottom:4}}>Danger Zone</div><button onClick={()=>{if(confirm("Reset ALL data?")){setData({});setCompleted({});dbSet("data",{});dbSet("completed",{});flash("Cleared");}}} style={{background:"none",border:"1px solid #e86060",color:"#e86060",borderRadius:8,padding:"10px 24px",fontWeight:700,fontSize:12,cursor:"pointer"}}>Reset All Data</button></div>
      </div>}
    </div>
  );
}

const C2={bg:"#171a1f",card:"#1e2228",brd:"#2d333b",acc:"#d4a04a",accD:"rgba(212,160,74,0.14)",txt:"#ecede8",mut:"#8b8880",inp:"#252a31"};
const T = {
  toast:{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",background:C2.acc,color:"#111",padding:"8px 24px",borderRadius:8,fontWeight:700,fontSize:13,zIndex:999,letterSpacing:.5},
  dateArr:{background:C2.card,border:"1px solid "+C2.brd,color:C2.txt,width:36,height:36,borderRadius:8,fontSize:20,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"},
  inp:{background:C2.inp,border:"1px solid "+C2.brd,borderRadius:6,color:C2.txt,padding:"7px 8px",fontSize:14,fontWeight:600,width:68,textAlign:"center",outline:"none",fontFamily:"monospace"},
  secTitle:{fontFamily:"monospace",fontSize:12,fontWeight:700,letterSpacing:2.5,color:C2.acc,marginBottom:14,textTransform:"uppercase"},
  pill:{background:C2.accD,color:C2.acc,padding:"2px 9px",borderRadius:4,fontSize:11,fontWeight:700,fontFamily:"monospace"},
  card:{background:C2.card,borderRadius:10,border:"1px solid "+C2.brd,padding:16,marginBottom:12},
  expBtn:{width:"100%",padding:12,background:C2.accD,color:C2.acc,border:"1px solid "+C2.acc,borderRadius:8,fontWeight:700,fontSize:13,cursor:"pointer"},
  impArea:{width:"100%",minHeight:70,background:C2.inp,border:"1px solid "+C2.brd,borderRadius:8,color:C2.txt,padding:10,fontSize:11,fontFamily:"monospace",marginTop:8,resize:"vertical",outline:"none"},
};

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
